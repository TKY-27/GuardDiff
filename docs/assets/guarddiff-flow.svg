<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">GuardDiff workflow</title>
  <desc id="desc">AI-generated diffs flow into GuardDiff and can be enforced through CLI, pre-commit, GitHub Action, SARIF, and VS Code.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1280" height="520" fill="#f6f7f2"/>
  <text x="80" y="76" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="36" font-weight="800">One scanner, every merge path</text>
  <text x="80" y="112" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">GuardDiff reviews the actual diff before it becomes production code.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="176" width="230" height="148" rx="12" fill="#ffffff" stroke="#d4d8ce"/>
    <text x="112" y="224" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">AI-generated diff</text>
    <text x="112" y="258" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Refactors, agent edits,</text>
    <text x="112" y="282" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">new config, scripts, docs</text>
  </g>

  <path d="M330 250 H450" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
  <path d="M438 236 L458 250 L438 264" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="480" y="150" width="320" height="200" rx="14" fill="#12343b"/>
    <text x="536" y="212" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="900">GuardDiff</text>
    <text x="536" y="250" fill="#d9ece8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">Secrets, auth removal, CORS,</text>
    <text x="536" y="276" fill="#d9ece8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">dangerous shell, package scripts,</text>
    <text x="536" y="302" fill="#d9ece8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">Firebase, and MCP exposure</text>
  </g>

  <path d="M820 250 H940" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
  <path d="M928 236 L948 250 L928 264" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="974" y="118" width="226" height="54" rx="10" fill="#ffffff" stroke="#d4d8ce"/>
    <text x="1002" y="153" fill="#0f172a" font-size="17" font-weight="800">CLI</text>
    <text x="1070" y="153" fill="#475569" font-size="15">local scans</text>

    <rect x="974" y="190" width="226" height="54" rx="10" fill="#ffffff" stroke="#d4d8ce"/>
    <text x="1002" y="225" fill="#0f172a" font-size="17" font-weight="800">Pre-commit</text>
    <text x="1112" y="225" fill="#475569" font-size="15">hooks</text>

    <rect x="974" y="262" width="226" height="54" rx="10" fill="#ffffff" stroke="#d4d8ce"/>
    <text x="1002" y="297" fill="#0f172a" font-size="17" font-weight="800">GitHub Action</text>

    <rect x="974" y="334" width="226" height="54" rx="10" fill="#ffffff" stroke="#d4d8ce"/>
    <text x="1002" y="369" fill="#0f172a" font-size="17" font-weight="800">SARIF + VS Code</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#475569">
    <text x="80" y="426">Security defaults: base-ref Action config, inline suppressions disabled in PRs by default, external rule packs opt-in only.</text>
    <text x="80" y="454">Privacy defaults: ignored path scans are skipped before file content is read, and matched secret material is masked in reports.</text>
  </g>
</svg>
