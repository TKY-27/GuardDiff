name: False positive
description: Report a finding that should not be emitted.
title: "[False positive]: "
labels: ["false-positive", "rules", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use placeholders instead of real secrets. For auth or config examples, reduce the code to the smallest safe snippet.
  - type: input
    id: rule
    attributes:
      label: Rule ID
      placeholder: "diff/auth-removed"
    validations:
      required: true
  - type: textarea
    id: snippet
    attributes:
      label: Minimal safe example
      render: diff
    validations:
      required: true
  - type: textarea
    id: why-safe
    attributes:
      label: Why this should be allowed
    validations:
      required: true
