name: Rule proposal
description: Propose a new GuardDiff detection rule.
title: "[Rule]: "
labels: ["rule", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use placeholders only. Do not paste real secrets, private code, or exploitable vulnerability details.
  - type: input
    id: rule_id
    attributes:
      label: Proposed rule ID
      placeholder: "diff/example-risk"
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk
      description: What risky AI-generated change should this catch?
    validations:
      required: true
  - type: textarea
    id: true_positive
    attributes:
      label: True-positive example
      description: Add a minimal safe placeholder example that should be flagged.
      render: text
    validations:
      required: true
  - type: textarea
    id: false_positive
    attributes:
      label: False-positive controls
      description: Add safe examples that should not be flagged.
      render: text
    validations:
      required: true
  - type: textarea
    id: remediation
    attributes:
      label: Remediation
      description: What should GuardDiff tell users to do?
