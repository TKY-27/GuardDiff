name: Feature request
description: Suggest a rule, integration, or workflow improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What risky AI-generated change or workflow should GuardDiff handle?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, output, or rule you want.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Add safe snippets, links, or comparable tools.
